# Rime custom default settings
patch:
  "menu/page_size": 6

  "ascii_composer/switch_key":
    Shift_L: noop
    Shift_R: noop

  "switcher/hotkeys":
    - "Control+Alt+grave"

  "switches":
    - name: ascii_mode
      reset: 0
      states: [ 中文, 西文 ]
    - name: full_shape
      reset: 0
      states: [ 半角, 全角 ]
    - name: zh_simp
      reset: 1
      states: [ 漢字, 汉字 ]
    - name: ascii_punct
      reset: 1
      states: [ 。，, ．， ]

  "key_binder/bindings":
    - {accept: Left, send: Up, when: has_menu}
    - {accept: Right, send: Down, when: has_menu}
    - {accept: Up, send: Page_Up, when: paging}
    - {accept: Down, send: Page_Down, when: has_menu}
    - {accept: minus, send: Page_Up, when: has_menu}
    - {accept: equal, send: Page_Down, when: has_menu}
    - {accept: "Control+Alt+1", toggle: ascii_punct, when: always}
    - {accept: "Control+Alt+2", toggle: ascii_mode, when: always}
    - {accept: "Control+Alt+3", toggle: full_shape, when: always}
    - {accept: "Control+Alt+4", toggle: simplification, when: always}
    - {accept: "Control+Alt+5", toggle: extended_charset, when: always}
